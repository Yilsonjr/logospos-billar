<div class="app-layout">
  <!-- Loading inicial -->
  <div *ngIf="isInitializing" class="loading-screen">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <h2>Iniciando LogosPOS...</h2>
      <p>Preparando interfaz</p>
      <div class="loading-progress">
        <div class="progress-bar"></div>
      </div>
      <small>Cargando en modo rápido</small>
    </div>
  </div>

  <!-- Bloqueo de licencia -->
  <div *ngIf="licencia?.bloqueado" class="license-blocked-screen">
    <div class="license-content">
      <i class="fa-solid fa-lock license-icon"></i>
      <h2>Acceso Restringido</h2>
      <p>{{ licencia?.mensaje }}</p>
      <hr>
      <p class="license-contact">Por favor, contacte con soporte técnico para reactivar su servicio.</p>
    </div>
  </div>

  <!-- Aplicación normal -->
  <div *ngIf="!isInitializing && !licencia?.bloqueado">
    <!-- Banner de advertencia (No bloqueante) -->
    <div *ngIf="licencia?.mensaje && !licencia?.bloqueado" class="license-warning-banner">
      <i class="fa-solid fa-circle-exclamation"></i>
      {{ licencia?.mensaje }}
    </div>
    <!-- Sidebar solo si está autenticado -->
    <app-navbar *ngIf="isAuthenticated"></app-navbar>

    <!-- Topbar solo si está autenticado -->
    <app-topbar *ngIf="isAuthenticated"></app-topbar>

    <!-- Contenido principal -->
    <main class="main-content" [class.main-content--no-sidebar]="!isAuthenticated"
      [class.main-content--sidebar-collapsed]="sidebarCollapsed && isAuthenticated">
      <router-outlet />
    </main>
  </div>
</div>
