<div class="modal-overlay" (click)="cancelar.emit()">
  <div class="modal-dialog modal-dialog-centered" style="max-width:480px;" (click)="$event.stopPropagation()">
    <div class="modal-content shadow-lg border-0 rounded-4">

      <!-- Header -->
      <div class="modal-header border-0 pb-0 pt-4 px-4">
        <div class="d-flex align-items-center gap-3">
          <div class="rounded-3 p-2" style="background:#fee2e2;">
            <i class="fa-solid fa-ban text-danger fs-5"></i>
          </div>
          <div>
            <h5 class="fw-bold mb-0 text-danger">{{ titulo }}</h5>
            <small class="text-muted" *ngIf="referencia">{{ referencia }}</small>
          </div>
        </div>
        <button type="button" class="btn-close" (click)="cancelar.emit()"></button>
      </div>

      <!-- Body -->
      <div class="modal-body px-4 pt-3 pb-2">

        <!-- Advertencia -->
        <div class="alert alert-warning d-flex gap-2 align-items-start py-2 mb-3">
          <i class="fa-solid fa-triangle-exclamation mt-1 flex-shrink-0"></i>
          <div class="small">
            Esta acción <strong>no se puede deshacer</strong>. El stock será restaurado
            y si la venta tenía NCF se generará una Nota de Crédito (B04).
          </div>
        </div>

        <!-- Motivo categoría -->
        <div class="mb-3">
          <label class="form-label fw-semibold small text-uppercase text-muted mb-1">
            Motivo de anulación <span class="text-danger">*</span>
          </label>
          <div class="d-grid gap-2">
            <button *ngFor="let m of motivos" type="button"
              class="btn text-start px-3 py-2 rounded-3 border"
              [class.btn-danger]="motivoCategoria === m.valor"
              [class.text-white]="motivoCategoria === m.valor"
              [class.btn-outline-secondary]="motivoCategoria !== m.valor"
              (click)="motivoCategoria = m.valor">
              <i class="fa-solid fa-circle-dot me-2 small"></i>{{ m.etiqueta }}
            </button>
          </div>
        </div>

        <!-- Detalle opcional -->
        <div class="mb-1">
          <label class="form-label fw-semibold small text-uppercase text-muted mb-1">
            Detalle adicional (opcional)
          </label>
          <textarea class="form-control" rows="2" [(ngModel)]="motivoDetalle"
            placeholder="Describe brevemente el motivo…" maxlength="300"></textarea>
        </div>

      </div>

      <!-- Footer -->
      <div class="modal-footer border-0 px-4 pb-4 pt-2 d-flex gap-2 justify-content-end">
        <button type="button" class="btn btn-outline-secondary px-4"
          [disabled]="procesando" (click)="cancelar.emit()">
          Cancelar
        </button>
        <button type="button" class="btn btn-danger px-4 fw-bold"
          [disabled]="!puedeConfirmar" (click)="onConfirmar()">
          <span *ngIf="procesando" class="spinner-border spinner-border-sm me-2"></span>
          <i *ngIf="!procesando" class="fa-solid fa-ban me-2"></i>
          {{ procesando ? 'Anulando…' : 'Confirmar anulación' }}
        </button>
      </div>

    </div>
  </div>
</div>

<style>
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 1060;
}
</style>
